<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a; /* يمكنك استبداله برابط خلفية متناسق */
            font-family: 'Courier New', Courier, monospace;
            color: #ff0000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            box-sizing: border-box;
        }
        .image-container img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 2px solid #ff0000;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        /* تصميم العداد التنازلي الجديد */
        .timer-container {
            margin-top: 20px;
            font-size: 3.5em;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0px 0px 15px #ff0000;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 3px;
        }
        .info {
            margin-top: 20px;
            font-size: 1.2em;
            color: #ff0000;
            text-shadow: 0px 0px 8px #ff0000;
            letter-spacing: 2px;
            text-align: left;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ff0000;
        }
        .text {
            margin-top: 10px;
            font-size: 2em;
            color: #fdfcfc;
            text-shadow: 0px 0px 8px #ffffff;
            letter-spacing: 2px;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="https://gifdb.com/images/high/puppet-with-fire-exdjlk4bbjsk381m.gif" alt="Image">
    </div>

    <div class="timer-container" id="countdown">10:00</div>

    <audio autoplay loop>
        <source src="91.mp3" type="audio/mpeg">
    </audio>

    <div class="text">hack by 7sn بعيوني عيال سواليف [RKF/O1KWT/GHA] سيرفركم مليان ثغرات</div>

    <div class="info" id="ip-info">
        <div><strong>IP:</strong> <span id="ip">جاري التحميل...</span></div>
        <div><strong>City:</strong> <span id="city">جاري التحميل...</span></div>
        <div><strong>Region:</strong> <span id="region">جاري التحميل...</span></div>
        <div><strong>Country:</strong> <span id="country">جاري التحميل...</span></div>
        <div><strong>Location:</strong> <span id="loc">جاري التحميل...</span></div>
        <div><strong>Organization:</strong> <span id="org">جاري التحميل...</span></div>
        <div><strong>Timezone:</strong> <span id="timezone">جاري التحميل...</span></div>
    </div>

    <script>
        // كود العداد التنازلي لـ 10 دقائق
        let duration = 10 * 60; // 10 دقائق بالثواني
        const display = document.getElementById('countdown');

        const timer = setInterval(() => {
            let minutes = Math.floor(duration / 60);
            let seconds = duration % 60;

            // إضافة صفر على اليسار إذا كانت الأرقام أقل من 10
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            display.textContent = minutes + ":" + seconds;

            if (--duration < 0) {
                clearInterval(timer);
                display.textContent = "00:00"; // ما يحدث عند انتهاء الوقت
                // يمكنك إضافة أي أمر هنا عند انتهاء الـ 10 دقائق
            }
        }, 1000);

        // جلب البيانات من واجهة برمجة التطبيقات (API) وتوزيعها بشكل صحيح
        fetch('https://ipinfo.io/json')
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            document.getElementById('ip').textContent = data.ip || 'N/A';
            document.getElementById('city').textContent = data.city || 'N/A';
            document.getElementById('region').textContent = data.region || 'N/A';
            document.getElementById('country').textContent = data.country || 'N/A';
            document.getElementById('loc').textContent = data.loc || 'N/A';
            document.getElementById('org').textContent = data.org || 'N/A';
            document.getElementById('timezone').textContent = data.timezone || 'N/A';
        })
        .catch(error => {
            console.error('حدث خطأ أثناء جلب البيانات:', error);
            document.getElementById('ip-info').textContent = 'فشل في تحميل البيانات الحالية.';
        });
    </script>

</body>
</html>
