<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord.gg/.</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('https://i.pinimg.com/originals/51/ae/a3/51aea3393b8234a1e69d8713a0a58bc3.gif') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            color: #ff0000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }
        .image-container img {
            width: 750px;
            height: auto;
            border: 2px solid #ff0000;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 255, 0.7);
        }
        .info {
            margin-top: 20px;
            font-size: 1.5em;
            color: #ff0000;
            text-shadow: 0px 0px 8px #ff0000, 0px 0px 15px #ff0000, 0px 0px 25px #ff0000;
            letter-spacing: 4.5px;
            white-space: pre-wrap;
            text-align: left;
        }
        .text {
            margin-top: 20px;
            font-size: 3em;
            color: #fdfcfc;
            text-shadow: 0px 0px 8px #ffffff, 0px 0px 15px #ffffff, 0px 0px 25px #ffffff;
            letter-spacing: 4.5px;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="https://gifdb.com/images/high/puppet-with-fire-exdjlk4bbjsk381m.gif" alt="Discord Image">
    </div>

    <audio autoplay loop>
        <source src="91.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="text">اما توردها مـواريـد الابطال ولا استـرح وخل المـراجل لاهلها hack by 7sn</div>

    <div class="info" id="ip-info">
        <span><strong>IP:</strong> <span id="ip">Loading...</span></span><br>
        <span><strong>City:</strong> <span id="city">Loading...</span></span><br>
        <span><strong>Region:</strong> <span id="region">Loading...</span></span><br>
        <span><strong>Country:</strong> <span id="country">Loading...</span></span><br>
        <span><strong>Location:</strong> <span id="loc">Loading...</span></span><br>
        <span><strong>Organization:</strong> <span id="org">Loading...</span></span><br>
        <span><strong>Timezone:</strong> <span id="timezone">Loading...</span></span>
    </div>

    <div class="text">بعيوني عيال سواليف</div>

    <script>
        // استخدام سيرفر ip-api السريع والمجاني
        fetch('https://ipapi.co/json/')
        .then(response => response.json())
        .then(data => {
            document.getElementById('ip').textContent = data.ip || 'N/A';
            document.getElementById('city').textContent = data.city || 'N/A';
            document.getElementById('region').textContent = data.region || 'N/A';
            document.getElementById('country').textContent = data.country_name || 'N/A';
            document.getElementById('loc').textContent = (data.latitude && data.longitude) ? `${data.latitude}, ${data.longitude}` : 'N/A';
            document.getElementById('org').textContent = data.org || 'N/A';
            document.getElementById('timezone').textContent = data.timezone || 'N/A';
        })
        .catch(error => {
            console.error('Error fetching IP:', error);
            document.getElementById('ip-info').textContent = "فشل في تحميل بيانات الـ IP بشكل سريع.";
        });
    </script>

</body>
</html>
